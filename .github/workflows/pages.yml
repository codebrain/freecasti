name: Deploy Web UI to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  # GitHub Pages project URL: https://codebrain.github.io/freecasti/
  # Requires a repository named "freecasti" under the codebrain account.
  PAGES_BASE_PATH: /freecasti/

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sync web-ui runtime assets
        run: python run.py

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web-ui/package-lock.json

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Build static bundle
        working-directory: web-ui
        env:
          VITE_BASE_PATH: ${{ env.PAGES_BASE_PATH }}
        run: |
          npm ci
          npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web-ui/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
