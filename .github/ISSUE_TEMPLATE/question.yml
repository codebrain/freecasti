name: Question
description: Ask about captures, the protocol spec, or development
title: "[question]: "
labels: ["question"]
body:
  - type: textarea
    id: question
    attributes:
      label: Your question
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Context
      description: What you've already tried, links to docs, hardware/firmware details
    validations:
      required: false
